<!doctype html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Parts Catalog</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <header class="wrap">
    <h1>Каталог запчастей</h1>

 <div class="row">
  <select id="brand"></select>
  <select id="model" disabled></select>
  <select id="assembly" disabled></select>
</div>

<!-- NEW: быстрые кнопки моделей -->
<div class="row" id="modelChips"></div>

    <div class="row">
      <input id="q" type="search" placeholder="Поиск: парт-номер / EN / RU…" />
      <button id="refresh" title="Перезагрузить данные">Обновить</button>
    </div>

    <div class="meta" id="meta"></div>
  </header>

  <main class="wrap">
    <div id="results" class="results"></div>
  </main>

  <script src="app.js"></script>
</body>
</html>
